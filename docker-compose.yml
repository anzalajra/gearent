services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                user: zewalo
                uid: 1000
        image: zewalo-app
        container_name: zewalo-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - './:/var/www'
            - './docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini'
        networks:
            - zewalo-network
        depends_on:
            - db
            - redis
    nginx:
        image: 'nginx:alpine'
        container_name: zewalo-nginx
        restart: unless-stopped
        ports:
            - '8000:80'
        volumes:
            - './:/var/www:ro'
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
        networks:
            - zewalo-network
        depends_on:
            - app
    db:
        image: 'postgres:16-alpine'
        container_name: zewalo-db
        restart: unless-stopped
        environment:
            POSTGRES_DB: '${DB_DATABASE:-zewalo_db}'
            POSTGRES_USER: '${DB_USERNAME:-zewalo_user}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password_rahasia}'
        volumes:
            - 'zewalo-db-data:/var/lib/postgresql/data'
        ports:
            - '5432:5432'
        networks:
            - zewalo-network
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U ${DB_USERNAME:-zewalo_user}'
            interval: 10s
            timeout: 5s
            retries: 5
    redis:
        image: 'redis:alpine'
        container_name: zewalo-redis
        restart: unless-stopped
        volumes:
            - 'zewalo-redis-data:/data'
        ports:
            - '6379:6379'
        networks:
            - zewalo-network
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            interval: 10s
            timeout: 5s
            retries: 5
    queue:
        image: zewalo-app
        container_name: zewalo-queue
        restart: unless-stopped
        working_dir: /var/www
        command: 'php artisan queue:work --sleep=3 --tries=3 --max-time=3600'
        volumes:
            - './:/var/www'
        networks:
            - zewalo-network
        depends_on:
            - app
            - db
            - redis
    scheduler:
        image: zewalo-app
        container_name: zewalo-scheduler
        restart: unless-stopped
        working_dir: /var/www
        command: 'sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"'
        volumes:
            - './:/var/www'
        networks:
            - zewalo-network
        depends_on:
            - app
            - db
            - redis
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
networks:
    zewalo-network:
        driver: bridge
volumes:
    zewalo-db-data: null
    zewalo-redis-data: null
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
