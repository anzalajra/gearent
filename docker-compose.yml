services:
  # PHP-FPM Service - Development
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        user: www
        uid: 1000
    image: zewalo-app-dev
    container_name: zewalo-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - zewalo-network
    depends_on:
      - db
      - redis

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: zewalo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - zewalo-network
    depends_on:
      - app

  # PostgreSQL 16 Service
  db:
    image: postgres:16-alpine
    container_name: zewalo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zewalo}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - zewalo-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - zewalo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sail} -d ${DB_DATABASE:-zewalo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Service
  redis:
    image: redis:alpine
    container_name: zewalo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - zewalo-network

  # Mailpit for email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: zewalo-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - zewalo-network

  # Node.js for Vite dev server
  node:
    image: node:20-alpine
    container_name: zewalo-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - zewalo-network

networks:
  zewalo-network:
    driver: bridge

volumes:
  zewalo-db-data:
