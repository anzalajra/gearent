services:
  app:
    image: ghcr.io/anzalajra/zewalo:latest
    container_name: zewalo-app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app-storage:/var/www/storage
      - app-cache:/var/www/bootstrap/cache
    networks:
      - zewalo-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    container_name: zewalo-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zewalo}
      POSTGRES_USER: ${DB_USERNAME:-zewalo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - zewalo-db-data:/var/lib/postgresql/data
    networks:
      - zewalo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-zewalo_user} -d ${DB_DATABASE:-zewalo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: zewalo-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - zewalo-redis-data:/data
    networks:
      - zewalo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  zewalo-network:
    driver: bridge

volumes:
  zewalo-db-data:
  zewalo-redis-data:
  app-storage:
  app-cache:
